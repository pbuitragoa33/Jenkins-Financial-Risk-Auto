version: '3.8'

services:
  api:
    build: .
    container_name: financial_risk_api
    ports:
      - "8000:8000"
    command: uvicorn src.model_deploy:app --host 0.0.0.0 --port 8000
    environment:
      - ARTIFACTS=/app/outputs/artefactos
      - DATA_FOLDER=/app/src/data
    volumes:
      - .:/app 

  frontend:
    build: .
    container_name: financial_risk_frontend
    ports:
      - "8501:8501"
    command: streamlit run src/model_interface.py
    environment:
      - API_URL=http://api:8000/predict
    volumes:
      - .:/app
    depends_on:
      - api 